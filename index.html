<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pacific Strike 1942</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}html,body{width:100%;height:100%;overflow:hidden;background:#101820;font-family:monospace;touch-action:none}body{display:flex;align-items:center;justify-content:center}#wrap{position:relative;width:min(100vw,720px);height:100vh;display:flex;align-items:center;justify-content:center;background:#07151f}canvas{image-rendering:pixelated;image-rendering:crisp-edges;width:min(100vw,720px);height:100vh;max-height:960px;background:#2a6f97;box-shadow:0 0 0 4px #05070a,0 0 0 8px #1b2632,0 12px 40px #000}#hud{position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:5;display:flex;gap:18px;align-items:center;justify-content:center;color:#f9e784;text-shadow:2px 2px #17324a;font:700 13px monospace;pointer-events:none;white-space:nowrap}#overlay{position:fixed;inset:0;background:linear-gradient(#0b1720ee,#132b3cee);display:flex;z-index:10;align-items:center;justify-content:center;flex-direction:column;text-align:center;color:#f9e784;text-shadow:3px 3px #07151f;padding:20px}h1{font-size:44px;letter-spacing:4px;color:#ffd166;margin-bottom:10px}.sub{font-size:15px;color:#9be564;margin:8px 0 22px}.panel{border:4px solid #f9e784;background:#17324a;padding:18px 24px;box-shadow:6px 6px #07151f;font-size:14px;line-height:1.9}.btn{margin-top:22px;background:#f94144;color:#fff;border:0;padding:14px 34px;font:900 18px monospace;box-shadow:5px 5px #07151f;cursor:pointer}.btn:active{transform:translate(3px,3px);box-shadow:2px 2px #07151f}.credits{position:fixed;bottom:8px;color:#88a5b7;font-size:11px;z-index:11}#mobile{display:none;position:fixed;inset:0;z-index:6;pointer-events:none}.joy{position:absolute;left:22px;bottom:28px;width:120px;height:120px;border:3px solid #f9e784;background:#17324a88;border-radius:999px;pointer-events:all}.stick{position:absolute;left:39px;top:39px;width:38px;height:38px;background:#ffd166;border:3px solid #07151f;border-radius:999px}.bomb{position:absolute;right:24px;bottom:46px;width:86px;height:86px;border-radius:999px;background:#f94144;color:#fff;border:4px solid #ffd166;display:flex;align-items:center;justify-content:center;font:900 15px monospace;box-shadow:4px 4px #07151f;pointer-events:all}@media(pointer:coarse),(max-width:800px){#mobile{display:block}#hud{font-size:10px;gap:8px}h1{font-size:32px}.panel{font-size:12px}}</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="360" height="480"></canvas></div>
<div id="hud"><span id="score">SCORE 000000</span><span id="stage">STAGE 1</span><span id="life">♥♥♥</span><span id="bombs">BOMB 3</span></div>
<div id="overlay"><h1>PACIFIC<br>STRIKE 1942</h1><div class="sub">ORIGINAL RETRO AIR COMBAT</div><div class="panel">方向键 / WASD：移动<br>自动射击　空格 / Z：炸弹<br>P：暂停<br>输入 1942：60秒无敌 + 无限炸弹</div><button class="btn" onclick="startGame()">START</button><div class="credits">Inspired by classic vertical shooters · original art & stages</div></div>
<div id="mobile"><div id="joy" class="joy"><div id="stick" class="stick"></div></div><div id="bomb" class="bomb">BOMB</div></div>
<script>
const c=document.getElementById('game'),ctx=c.getContext('2d');ctx.imageSmoothingEnabled=false;
const W=360,H=480,keys={},MAX_POWER=4;let player,bullets,enemyBullets,enemies,fx,powerups,clouds,islands,score,lives,stage,bombs,frame,fireT,spawnT,paused,gameState,cheat='',godModeTimer=0,touch={x:0,y:0},boss=null;
const waveBook=[
  [{t:'vee',n:5,x:70},{t:'line',n:6,x:40},{t:'zig',n:5,x:260},{t:'boss'}],
  [{t:'zig',n:8,x:90},{t:'vee',n:7,x:220},{t:'line',n:10,x:20},{t:'boss'}],
  [{t:'vee',n:9,x:50},{t:'zig',n:10,x:250},{t:'line',n:12,x:30},{t:'boss'}]
];let waveIndex=0,waveDelay=0;
function rnd(a,b){return Math.random()*(b-a)+a}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function px(x,y,w,h,col){ctx.fillStyle=col;ctx.fillRect(x|0,y|0,w|0,h|0)}
function text(s,x,y,col='#f9e784',size=8,align='left'){ctx.fillStyle=col;ctx.font=`${size}px monospace`;ctx.textAlign=align;ctx.fillText(s,x|0,y|0)}
function handleCheat(code){let d='';if(code.startsWith('Digit'))d=code.slice(5);if(code.startsWith('Numpad'))d=code.slice(6);if(!d)return;cheat=(cheat+d).slice(-4);if(cheat==='1942'&&gameState==='playing'){godModeTimer=3600;player.inv=3600;bombs=Infinity;burst(player.x,player.y,'#ffd166',40)}}
document.addEventListener('keydown',e=>{keys[e.code]=true;handleCheat(e.code);if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();if(e.code==='KeyP'&&gameState==='playing')paused=!paused});document.addEventListener('keyup',e=>keys[e.code]=false);
function setupTouch(){const joy=document.getElementById('joy'),stick=document.getElementById('stick'),bomb=document.getElementById('bomb');let active=false;function set(x,y){let r=joy.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,dx=x-cx,dy=y-cy,len=Math.hypot(dx,dy)||1,m=46;if(len>m){dx=dx/len*m;dy=dy/len*m}stick.style.transform=`translate(${dx}px,${dy}px)`;touch.x=dx/m;touch.y=dy/m}joy.addEventListener('touchstart',e=>{active=true;set(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault()},{passive:false});joy.addEventListener('touchmove',e=>{if(active)set(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault()},{passive:false});joy.addEventListener('touchend',()=>{active=false;touch={x:0,y:0};stick.style.transform='translate(0,0)'});joy.addEventListener('mousedown',e=>{active=true;set(e.clientX,e.clientY)});window.addEventListener('mousemove',e=>{if(active)set(e.clientX,e.clientY)});window.addEventListener('mouseup',()=>{active=false;touch={x:0,y:0};stick.style.transform='translate(0,0)'});bomb.onclick=useBomb;bomb.addEventListener('touchstart',e=>{useBomb();e.preventDefault()},{passive:false})}setupTouch();
function startGame(){document.getElementById('overlay').style.display='none';player={x:180,y:410,w:15,h:18,s:2.3,inv:100,power:1};bullets=[];enemyBullets=[];enemies=[];fx=[];powerups=[];clouds=[];islands=[];score=0;lives=3;stage=1;bombs=3;frame=0;fireT=0;spawnT=0;paused=false;gameState='playing';cheat='';godModeTimer=0;boss=null;waveIndex=0;waveDelay=60;for(let i=0;i<18;i++)clouds.push({x:rnd(0,W),y:rnd(0,H),s:rnd(.4,1.3),v:rnd(.25,.9)});for(let i=0;i<5;i++)islands.push({x:rnd(20,W-50),y:rnd(0,H),w:rnd(28,70),h:rnd(18,42),v:rnd(.5,1.1)});loop()}
function spawnWave(){let book=waveBook[(stage-1)%waveBook.length],w=book[waveIndex++%book.length];if(w.t==='boss'){spawnBoss();return}for(let i=0;i<w.n;i++){let x=w.x+(w.t==='line'?i*28:(w.t==='vee'?(i-w.n/2)*18:Math.sin(i)*42));enemies.push({type:w.t,x,y:-20-i*22,base:x,hp:stage>2?2:1,w:16,h:14,v:1.1+stage*.12,phase:i*.7,score:20+stage*5,shoot:rnd(40,130)})}}
function spawnBoss(){boss={x:180,y:-45,w:70,h:42,hp:40+stage*18,max:40+stage*18,shoot:80,score:800+stage*200};enemies.push(boss)}
function shoot(){let p=player,spd=5.8;if(p.power===1)bullets.push({x:p.x,y:p.y-14,vx:0,vy:-spd,d:1});else if(p.power===2){bullets.push({x:p.x-5,y:p.y-12,vx:0,vy:-spd,d:1},{x:p.x+5,y:p.y-12,vx:0,vy:-spd,d:1})}else{bullets.push({x:p.x,y:p.y-16,vx:0,vy:-spd-1,d:2},{x:p.x-8,y:p.y-10,vx:-.55,vy:-spd,d:1},{x:p.x+8,y:p.y-10,vx:.55,vy:-spd,d:1});if(p.power>=4)bullets.push({x:p.x-13,y:p.y-7,vx:-1.1,vy:-spd+1,d:1},{x:p.x+13,y:p.y-7,vx:1.1,vy:-spd+1,d:1})}}
function useBomb(){if(gameState!=='playing'||paused)return;if(bombs<=0)return;if(bombs!==Infinity)bombs--;enemies.forEach(e=>{e.hp-=999;score+=e.score;burst(e.x,e.y,e===boss?'#f94144':'#ffd166',18)});enemies=[];boss=null;enemyBullets=[];shake=12;for(let i=0;i<80;i++)fx.push({x:rnd(0,W),y:rnd(40,H-40),vx:rnd(-2,2),vy:rnd(-2,2),life:rnd(18,40),c:['#f94144','#ffd166','#f9e784','#fff'][i%4]})}
let shake=0;function burst(x,y,c,n=10){for(let i=0;i<n;i++){let a=rnd(0,Math.PI*2),sp=rnd(.6,3);fx.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:rnd(16,32),c})}}
function hit(a,b,pad=0){return Math.abs(a.x-b.x)<(a.w+b.w)/2+pad&&Math.abs(a.y-b.y)<(a.h+b.h)/2+pad}
function update(){if(gameState!=='playing'||paused)return;frame++;let p=player,dx=(keys.ArrowRight||keys.KeyD?1:0)-(keys.ArrowLeft||keys.KeyA?1:0)+touch.x,dy=(keys.ArrowDown||keys.KeyS?1:0)-(keys.ArrowUp||keys.KeyW?1:0)+touch.y;p.x=clamp(p.x+dx*p.s,16,W-16);p.y=clamp(p.y+dy*p.s,28,H-22);if(p.inv>0)p.inv--;if(godModeTimer>0){godModeTimer--;p.inv=Math.max(p.inv,2);if(godModeTimer===0&&bombs===Infinity)bombs=3}fireT++;if(fireT>7){shoot();fireT=0}if(waveDelay>0)waveDelay--;else if(enemies.length===0){spawnWave();waveDelay=80}if(frame%900===0){stage++;waveIndex=0;waveDelay=110;burst(W/2,80,'#9be564',30)}clouds.forEach(o=>{o.y+=o.v;if(o.y>H+25){o.y=-25;o.x=rnd(0,W)}});islands.forEach(o=>{o.y+=o.v;if(o.y>H+50){o.y=-70;o.x=rnd(20,W-50);o.w=rnd(28,70);o.h=rnd(18,42)}});bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy});bullets=bullets.filter(b=>b.y>-20&&b.x>-20&&b.x<W+20);enemyBullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy});enemyBullets=enemyBullets.filter(b=>b.y<H+20&&b.x>-20&&b.x<W+20);enemies.forEach(e=>{if(e===boss){e.y=Math.min(74,e.y+0.55);e.x=180+Math.sin(frame*.025)*78;e.shoot--;if(e.shoot<=0){e.shoot=34;for(let k=-2;k<=2;k++)enemyBullets.push({x:e.x,y:e.y+18,vx:k*.75,vy:2.4,w:5,h:5})}}else{e.y+=e.v;e.x=e.base+(e.type==='zig'?Math.sin(frame*.04+e.phase)*52:e.type==='vee'?Math.sin(e.y*.035+e.phase)*10:0);e.shoot--;if(e.shoot<=0){e.shoot=rnd(80,160);let a=Math.atan2(p.y-e.y,p.x-e.x);enemyBullets.push({x:e.x,y:e.y,vx:Math.cos(a)*2,vy:Math.sin(a)*2,w:5,h:5})}}});enemies=enemies.filter(e=>e.y<H+40&&e.hp>0);bullets.forEach(b=>enemies.forEach(e=>{if(hit({x:b.x,y:b.y,w:4,h:6},e,1)){e.hp-=b.d;b.y=-99;burst(b.x,b.y,'#fff',3);if(e.hp<=0){score+=e.score;burst(e.x,e.y,e===boss?'#f94144':'#ffd166',e===boss?44:12);if(e===boss){boss=null;stage++;waveIndex=0;waveDelay=120}if(Math.random()<.12)powerups.push({x:e.x,y:e.y,w:12,h:12,v:1.2})}}}));powerups.forEach(u=>u.y+=u.v);powerups=powerups.filter(u=>u.y<H+20);powerups.forEach(u=>{if(hit(p,u,4)){p.power=Math.min(MAX_POWER,p.power+1);u.y=999;burst(u.x,u.y,'#9be564',10)}});if(p.inv<=0){enemyBullets.forEach(b=>{if(hit(p,b,3)){b.y=999;damage()}});enemies.forEach(e=>{if(hit(p,e,3)){e.hp=0;damage();burst(e.x,e.y,'#f94144',12)}})}fx.forEach(f=>{f.x+=f.vx;f.y+=f.vy;f.life--;f.vx*=.96;f.vy*=.96});fx=fx.filter(f=>f.life>0);if(shake>0)shake--;document.getElementById('score').textContent='SCORE '+String(score).padStart(6,'0');document.getElementById('stage').textContent='STAGE '+stage;document.getElementById('life').textContent='♥'.repeat(Math.max(0,lives));document.getElementById('bombs').textContent='BOMB '+(bombs===Infinity?'∞':bombs)}
function damage(){lives--;player.inv=110;shake=10;burst(player.x,player.y,'#6ec6ff',24);if(lives<=0)gameOver()}
function gameOver(){gameState='over';let ov=document.getElementById('overlay');ov.style.display='flex';ov.innerHTML=`<h1>MISSION<br>FAILED</h1><div class="sub">SCORE ${score}</div><div class="panel">STAGE ${stage}<br>再来一次，哥？</div><button class="btn" onclick="startGame()">RETRY</button><div class="credits">Pacific Strike 1942</div>`}
function drawSea(){ctx.fillStyle='#2a6f97';ctx.fillRect(0,0,W,H);for(let y=(frame*1.1)%24-24;y<H;y+=24){ctx.fillStyle='rgba(255,255,255,.08)';for(let x=0;x<W;x+=48)px(x+(y%48),y,18,2,'rgba(255,255,255,.08)')}islands.forEach(o=>{px(o.x,o.y,o.w,o.h,'#2d6a4f');px(o.x+4,o.y+4,o.w-8,o.h-8,'#52b788');px(o.x+o.w*.25,o.y+o.h*.3,o.w*.35,4,'#f4d35e')});clouds.forEach(o=>{px(o.x,o.y,22*o.s,8*o.s,'rgba(255,255,255,.45)');px(o.x+8*o.s,o.y-5*o.s,18*o.s,12*o.s,'rgba(255,255,255,.55)')})}
function drawPlane(p){if(p.inv>0&&Math.floor(frame/4)%2)return;px(p.x-2,p.y-17,4,28,'#ffd166');px(p.x-7,p.y-8,14,12,'#f94144');px(p.x-19,p.y-2,38,7,'#f9e784');px(p.x-5,p.y+8,10,7,'#6ec6ff');px(p.x-1,p.y-21,2,6,'#fff')}
function drawEnemy(e){if(e===boss){px(e.x-35,e.y-12,70,25,'#6d597a');px(e.x-25,e.y-22,50,18,'#b56576');px(e.x-55,e.y,110,13,'#355070');px(e.x-6,e.y+10,12,12,'#ffd166');px(e.x-18,e.y-5,8,8,'#f9e784');px(e.x+10,e.y-5,8,8,'#f9e784');px(70,18,220,5,'#341b24');px(70,18,220*(e.hp/e.max),5,'#f94144')}else{let col=e.type==='zig'?'#f94144':e.type==='vee'?'#ffd166':'#9be564';px(e.x-3,e.y-8,6,18,col);px(e.x-13,e.y-2,26,6,'#17324a');px(e.x-5,e.y+6,10,5,'#f9e784')}}
function draw(){ctx.save();if(shake)ctx.translate(rnd(-shake,shake),rnd(-shake,shake));drawSea();bullets.forEach(b=>{px(b.x-1,b.y-5,3,9,'#fff');px(b.x-1,b.y-9,3,3,'#ffd166')});enemyBullets.forEach(b=>px(b.x-3,b.y-3,6,6,'#f94144'));powerups.forEach(u=>{px(u.x-6,u.y-6,12,12,'#9be564');text('P',u.x-3,u.y+3,'#07151f',8)});enemies.forEach(drawEnemy);drawPlane(player);fx.forEach(f=>{ctx.globalAlpha=Math.max(0,f.life/30);px(f.x,f.y,3,3,f.c);ctx.globalAlpha=1});if(paused)text('PAUSED',W/2,H/2,'#ffd166',22,'center');if(godModeTimer>0)text('GOD '+Math.ceil(godModeTimer/60),W/2,38,'#ffd166',12,'center');ctx.restore()}
function loop(){update();draw();if(gameState==='playing')requestAnimationFrame(loop)}
frame=0;clouds=[];islands=[];drawSea();text('READY',W/2,H/2,'#ffd166',22,'center');
</script>
</body>
</html>
