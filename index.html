<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>1942</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none}body{display:flex;align-items:center;justify-content:center}
canvas{image-rendering:pixelated;width:min(100vw,512px);height:auto;aspect-ratio:256/240;max-height:100vh;background:#001;border:4px solid #333}
#hud{position:fixed;top:5px;left:50%;transform:translateX(-50%);z-index:5;display:flex;gap:14px;color:#f8f8f0;font:700 10px monospace;text-shadow:2px 2px #000;pointer-events:none;white-space:nowrap}
#ov{position:fixed;inset:0;background:#000c;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#f8f8f0;font-family:monospace}
#ov .t1{font:900 68px monospace;color:#f8f8f0;text-shadow:8px 8px #008,0 0 6px #aaf;letter-spacing:18px;line-height:1}
#ov .t2{font:600 11px monospace;color:#ff8;margin:10px 0 16px;letter-spacing:4px}
#ov .i{border:2px solid #888;padding:12px 20px;background:#111e;font:10px monospace;line-height:2;color:#aaa}
#ov .b{margin-top:14px;background:transparent;color:#f8f8f0;border:2px solid #f8f8f0;padding:8px 28px;font:900 14px monospace;cursor:pointer}
#ov .b:active{background:#444}
.blink{animation:bb 1s steps(1) infinite}@keyframes bb{50%{opacity:0}}
</style></head>
<body>
<canvas id="c" width="256" height="240"></canvas>
<div id="hud"><span id="sc">SCORE:     0</span><span id="st">STAGE 1</span><span id="li">LIFE  3</span><span id="bo">BOMB 3</span></div>
<div id="ov"><div class="t1">1942</div><div class="t2">CAPCOM  1984</div><div class="i">← → ↑ ↓ MOVE<br>SPACE/Z BOMB<br>P PAUSE<br>1942 GOD</div><button class="b blink" onclick="start()">PUSH START</button><div style="color:#444;font:9px monospace;margin-top:16px">FAN EDITION</div></div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
ctx.imageSmoothingEnabled=false;
const W=256,H=240,keys={};
let P,B,EB,E,FX,PU,CL,IS,sc,li,st,bo,fr,ft,sp,ps,gs,ch='',gd=0,t_dx=0,t_dy=0,boss=null,wv=0,wd=0;
const WB=[
 [{t:'v',n:5,x:44},{t:'l',n:6,x:16},{t:'z',n:5,x:172},{t:'boss'}],
 [{t:'z',n:8,x:32},{t:'v',n:7,x:160},{t:'l',n:10,x:8},{t:'boss'}],
 [{t:'v',n:9,x:24},{t:'z',n:10,x:176},{t:'l',n:12,x:8},{t:'boss'}],
 [{t:'l',n:14,x:4},{t:'v',n:10,x:60},{t:'z',n:10,x:184},{t:'boss'}]
];
function ra(a,b){return Math.random()*(b-a)+a}
function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x|0,y|0,w|0,h|0)}
function tx(s,x,y,c='#f8f8f0',sz=8,a='left'){ctx.fillStyle=c;ctx.font=sz+'px monospace';ctx.textAlign=a;ctx.fillText(s,x|0,y|0)}

function chk(cd){
 let d='';
 if(cd.startsWith('Digit'))d=cd.slice(5);
 if(cd.startsWith('Numpad'))d=cd.slice(6);
 if(!d)return;
 ch=(ch+d).slice(-4);
 if(ch==='1942'&&gs==='play'){gd=3600;P.iv=3600;bo=Infinity;pe(P.x,P.y,'#fd7',40)}
}
document.addEventListener('keydown',e=>{
 keys[e.code]=true;chk(e.code);
 if(['Space','KeyZ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
 if((e.code==='Space'||e.code==='KeyZ')&&gs==='play')usb();
 if(e.code==='KeyP'&&gs==='play')ps=!ps;
});
document.addEventListener('keyup',e=>keys[e.code]=false);
c.addEventListener('touchstart',e=>{let r=c.getBoundingClientRect(),t=e.touches[0];t_dx=((t.clientX-r.left)/r.width-.5)*2;t_dy=-((t.clientY-r.top)/r.height-.5)*2;t_dx=Math.max(-1,Math.min(1,t_dx));t_dy=Math.max(-1,Math.min(1,t_dy))});
c.addEventListener('touchmove',e=>{e.preventDefault();let r=c.getBoundingClientRect(),t=e.touches[0];t_dx=((t.clientX-r.left)/r.width-.5)*2;t_dy=-((t.clientY-r.top)/r.height-.5)*2;t_dx=Math.max(-1,Math.min(1,t_dx));t_dy=Math.max(-1,Math.min(1,t_dy))},{passive:false});
c.addEventListener('touchend',()=>{t_dx=0;t_dy=0});

function start(){
 document.getElementById('ov').style.display='none';
 P={x:128,y:212,w:16,h:18,s:2.2,iv:100,p:1};
 B=[];EB=[];E=[];FX=[];PU=[];CL=[];IS=[];
 sc=0;li=3;st=1;bo=3;fr=0;ft=0;sp=0;ps=false;gs='play';ch='';gd=0;boss=null;wv=0;wd=70;
 for(let i=0;i<10;i++)CL.push({x:ra(0,W),y:ra(0,H),s:ra(.3,1.2),v:ra(.15,.5)});
 for(let i=0;i<4;i++)IS.push({x:ra(16,W-60),y:ra(20,H),w:ra(28,52),h:ra(14,28),v:ra(.3,.7)});
 requestAnimationFrame(loop);
}
function sw(){
 let wb=WB[(st-1)%WB.length],w=wb[wv++%wb.length];
 if(w.t==='boss'){bc();return}
 for(let i=0;i<w.n;i++){
  let xo=w.t==='l'?w.x+i*20:(w.t==='v'?(i-w.n/2)*14:(i%2?1:-1)*Math.abs(Math.sin(i*1.3))*32);
  E.push({t:w.t,x,y:-12-i*12,bx:w.x+xo,hp:st>1?2:1,w:14,h:12,v:.7+st*.06,ph:i*.4,sc:10+st*3,sh:ra(60,120)})
 }
}
function bc(){boss={x:128,y:-38,w:56,h:28,hp:30+st*15,mx:30+st*15,sh:50,sc:500+st*100};E.push(boss)}
function sh(){
 let p=P,sp=5.2;
 if(p.p===1)B.push({x:p.x,y:p.y-12,vx:0,vy:-sp,d:1});
 else if(p.p===2){B.push({x:p.x-5,y:p.y-10,vx:0,vy:-sp,d:1});B.push({x:p.x+5,y:p.y-10,vx:0,vy:-sp,d:1})}
 else{B.push({x:p.x,y:p.y-14,vx:0,vy:-sp,d:2});B.push({x:p.x-8,y:p.y-8,vx:-.5,vy:-sp,d:1});B.push({x:p.x+8,y:p.y-8,vx:.5,vy:-sp,d:1});if(p.p>=4){B.push({x:p.x-14,y:p.y-5,vx:-1,vy:-sp+1,d:1});B.push({x:p.x+14,y:p.y-5,vx:1,vy:-sp+1,d:1})}}
}
function usb(){
 if(gs!=='play'||ps)return;
 if(bo<=0)return;
 if(bo!==Infinity)bo--;
 E.forEach(e=>{e.hp-=999;sc+=e.sc;pe(e.x,e.y,e===boss?'#f44':'#fc8',25)});
 E=[];boss=null;EB=[];shk=20;
 for(let i=0;i<70;i++)FX.push({x:ra(0,W),y:ra(20,H-20),vx:ra(-2.5,2.5),vy:ra(-2.5,2.5),life:ra(15,42),c:['#f44','#fc8','#fea','#fff'][i%4]});
}
let shk=0;
function pe(x,y,c,n=8){for(let i=0;i<n;i++){let a=ra(0,Math.PI*2),sp=ra(.4,2.5);FX.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:ra(10,28),c})}}

function up(){
 if(gs!=='play'||ps)return;
 fr++;let p=P;
 let dx=(keys.ArrowRight||keys.KeyD?1:0)-(keys.ArrowLeft||keys.KeyA?1:0)+t_dx;
 let dy=(keys.ArrowDown||keys.KeyS?1:0)-(keys.ArrowUp||keys.KeyW?1:0)-t_dy;
 p.x=Math.max(10,Math.min(W-10,p.x+dx*p.s));
 p.y=Math.max(18,Math.min(H-20,p.y+dy*p.s));
 if(p.iv>0)p.iv--;
 if(gd>0){gd--;p.iv=Math.max(p.iv,2);if(gd===0&&bo===Infinity)bo=3}
 ft++;if(ft>7){sh();ft=0}
 if(wd>0)wd--;else if(E.length===0){sw();wd=65}
 if(fr%900===0){st++;wv=0;wd=100;pe(W/2,50,'#4ea',25)}
 CL.forEach(o=>{o.y+=o.v;if(o.y>H+20){o.y=-20;o.x=ra(0,W)}});
 IS.forEach(o=>{o.y+=o.v;if(o.y>H+50){o.y=-60;o.x=ra(16,W-60);o.w=ra(28,52);o.h=ra(14,28)}});
 B.forEach(b=>{b.x+=b.vx;b.y+=b.vy});B=B.filter(b=>b.y>-15&&b.x>-15&&b.x<W+15);
 EB.forEach(b=>{b.x+=b.vx;b.y+=b.vy});EB=EB.filter(b=>b.y<H+15&&b.x>-15&&b.x<W+15);
 E.forEach(e=>{
  if(e===boss){e.y=Math.min(48,e.y+.4);e.x=128+Math.sin(fr*.022)*95;e.sh--;if(e.sh<=0){e.sh=28;for(let k=-2;k<=2;k++)EB.push({x:e.x,y:e.y+14,vx:k*.65,vy:1.8})}}
  else{e.y+=e.v;e.x=e.bx+(e.t==='z'?Math.sin(fr*.035+e.ph)*32:e.t==='v'?Math.sin(e.y*.03+e.ph)*5:0);e.sh--;if(e.sh<=0){e.sh=ra(50,120);let a=Math.atan2(p.y-e.y,p.x-e.x);EB.push({x:e.x,y:e.y,vx:Math.cos(a)*1.5,vy:Math.sin(a)*1.5})}}
 });
 E=E.filter(e=>e.y<H+30&&e.hp>0);
 B.forEach(b=>E.forEach(e=>{
  if(Math.abs(b.x-e.x)<8&&Math.abs(b.y-e.y)<7){e.hp-=b.d;b.y=-99;pe(b.x,b.y,'#ffe',2);if(e.hp<=0){sc+=e.sc;pe(e.x,e.y,e===boss?'#f44':'#fc8',e===boss?30:10);if(e===boss){boss=null;st++;wv=0;wd=80}if(ra(0,1)<.1&&p.p<4)PU.push({x:e.x,y:e.y,v:1})}}
 }));
 PU.forEach(u=>u.y+=u.v);PU=PU.filter(u=>u.y<H+15);
 PU.forEach(u=>{if(Math.abs(u.x-p.x)<12&&Math.abs(u.y-p.y)<12){p.p=Math.min(4,p.p+1);u.y=999;pe(u.x,u.y,'#4ea',8)}});
 if(p.iv<=0){
  EB.forEach(b=>{if(Math.abs(b.x-p.x)<8&&Math.abs(b.y-p.y)<6){b.y=999;dm()}});
  E.forEach(e=>{if(Math.abs(e.x-p.x)<10&&Math.abs(e.y-p.y)<8){e.hp=0;dm();pe(e.x,e.y,'#f44',10)}})
 }
 FX.forEach(f=>{f.x+=f.vx;f.y+=f.vy;f.life--;f.vx*=.95;f.vy*=.95});FX=FX.filter(f=>f.life>0);
 if(shk>0)shk--;
 let si=String(sc).padStart(6,' ');document.getElementById('sc').textContent='SCORE: '+si;
 document.getElementById('st').textContent='STAGE '+st;
 document.getElementById('li').textContent='LIFE  '+li;
 document.getElementById('bo').textContent='BOMB '+(bo===Infinity?'∞':bo);
}
function dm(){li--;P.iv=90;shk=10;pe(P.x,P.y,'#0cf',20);if(li<=0){gs='over';let o=document.getElementById('ov');o.style.display='flex';o.innerHTML='<div class="t1" style="font-size:38px;letter-spacing:6px">GAME OVER</div><div class="t2">SCORE: '+sc+'</div><div class="i">STAGE '+st+'</div><button class="b" onclick="location.reload()">RETRY</button>'}}

// ── Draw ──
function dSea(){
 ctx.fillStyle='#001830';ctx.fillRect(0,0,W,H);
 for(let y=(fr*1.5)%24-24;y<H;y+=24){
  for(let x=0;x<W;x+=32){
   ctx.fillStyle='rgba(255,255,255,.04)';
   ctx.fillRect(x+(y%32),y,14,2);
   ctx.fillRect(x+16+(y%32),y+10,10,2)
  }
 }
 IS.forEach(o=>{
  px(o.x,o.y+o.h*.35,o.w,o.h*.45,'#1a4a28');
  px(o.x+2,o.y+o.h*.12,o.w-4,o.h*.45,'#3a8a50');
  px(o.x+3,o.y+o.h*.22,o.w*.2,2,'#d8b050');
  for(let i=0;i<3;i++){let tx=o.x+4+i*10,ty=o.y+o.h*.1+i%2*4;px(tx,ty,2,7,'#4a2a12');px(tx-2,ty-4,6,6,'#2a8a4a')}
 });
 CL.forEach(o=>{ctx.globalAlpha=.3;px(o.x,o.y,16*o.s,4*o.s,'#fff');ctx.globalAlpha=.45;px(o.x+4*o.s,o.y-2*o.s,12*o.s,6*o.s,'#fff');ctx.globalAlpha=1})
}
function dPl(p){
 if(p.iv>0&&Math.floor(fr/3)%2)return;
 // P-38 style - green twin-boom fighter
 px(p.x-8,p.y-20,16,5,'#4a6832');           // top wing
 px(p.x-10,p.y-17,20,4,'#2a4a1a');           // upper fuselage
 px(p.x-11,p.y-14,22,6,'#5a7a3a');           // main body
 px(p.x-12,p.y-9,24,7,'#4a6832');            // lower body
 px(p.x-9,p.y-3,18,5,'#3a5a2a');             // tail section
 // left boom
 px(p.x-14,p.y-10,4,10,'#3a5a2a');
 px(p.x-15,p.y-10,3,8,'#2a4a1a');
 px(p.x-16,p.y-2,4,5,'#3a5a2a');
 px(p.x-16,p.y+1,3,4,'#2a4a1a');
 // right boom
 px(p.x+10,p.y-10,4,10,'#3a5a2a');
 px(p.x+12,p.y-10,3,8,'#2a4a1a');
 px(p.x+12,p.y-2,4,5,'#3a5a2a');
 px(p.x+13,p.y+1,3,4,'#2a4a1a');
 // cockpit
 px(p.x-4,p.y-9,8,5,'#71ccee');
 // propeller
 if(fr%4<2)px(p.x-1,p.y-24,2,5,'#c8a060');
 else px(p.x-1,p.y-24,2,5,'#a08050');
 // wing details
 px(p.x-4,p.y-20,8,3,'#3a5a2a');
 // engine nacelles
 px(p.x+5,p.y-16,3,3,'#2a4a1a');
 px(p.x-8,p.y-16,3,3,'#2a4a1a');
}
function dEn(e){
 if(e===boss){
  px(e.x-28,e.y-5,56,10,'#3a2212');         // upper fuselage
  px(e.x-30,e.y-1,60,10,'#5a3a22');          // main body
  px(e.x-32,e.y+4,64,10,'#4a2a1a');          // lower body
  px(e.x-20,e.y-14,40,10,'#4a2a1a');         // tail fin
  px(e.x-34,e.y+8,24,5,'#7a3a2a');           // left wing
  px(e.x+10,e.y+8,24,5,'#7a3a2a');           // right wing
  px(e.x-8,e.y-2,16,12,'#d8c878');           // cockpit glass
  px(e.x-4,e.y+4,8,5,'#f44');                // nose
  // health bar
  px(16,128,224,4,'#222');
  px(16,128,224*(e.hp/e.mx),4,'#f44');
  tx('BOSS',100,125,'#fc8',8,'left')
 }else{
  // Fighter plane sprite
  let c=e.t==='z'?'#6a8ac0':e.t==='v'?'#c08a4a':'#8a9a8a';
  let d=e.t==='z'?'#4a6a9a':e.t==='v'?'#a06a2a':'#6a7a6a';
  px(e.x-6,e.y-4,12,8,c);                    // body
  px(e.x-7,e.y-2,14,4,d);                    // lower body
  px(e.x-8,e.y+1,16,3,c);                    // wings
  px(e.x-3,e.y-6,6,3,'#ffe');                // cockpit
  px(e.x-5,e.y-3,10,2,'#ffe7cc');            // highlight
  px(e.x-7,e.y+3,4,2,d);                     // tail
  px(e.x+3,e.y+3,4,2,d);                     // tail
 }
}
function dr(){
 ctx.save();
 if(shk)ctx.translate(ra(-shk,shk),ra(-shk,shk));
 dSea();
 B.forEach(b=>{ctx.fillStyle='#ffe';ctx.fillRect(b.x-2,b.y-6,4,10);ctx.fillStyle='#fd7';ctx.fillRect(b.x-1,b.y-10,2,4)});
 EB.forEach(b=>{ctx.fillStyle='#f44';ctx.fillRect(b.x-3,b.y-3,6,6);ctx.fillStyle='#ffa';ctx.fillRect(b.x-1,b.y-1,2,2)});
 PU.forEach(u=>{px(u.x-6,u.y-6,12,12,'#222');px(u.x-5,u.y-5,10,10,'#e44');px(u.x-3,u.y-3,6,6,'#fea');tx('P',u.x-3,u.y+3,'#200',7)});
 E.forEach(dEn);
 dPl(P);
 FX.forEach(f=>{ctx.globalAlpha=Math.max(0,f.life/30);ctx.fillStyle=f.c;ctx.fillRect(f.x-1,f.y-1,3,3);ctx.fillRect(f.x-3,f.y-3,7,7);ctx.globalAlpha=1});
 if(ps)tx('PAUSE',W/2,120,'#fc8',12,'center');
 if(gd>0)tx('GOD',W/2,15,'#fc8',9,'center');
 ctx.restore()
}
function loop(){up();dr();if(gs==='play')requestAnimationFrame(loop)}
</script>
</body>
</html>
